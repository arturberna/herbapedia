<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 105">

  <!-- Folha (upper-left) -->
  <ellipse cx="28" cy="32" rx="13" ry="27"
    transform="rotate(-38 28 32)"
    fill="#7ab87a"/>
  <!-- Veia central da folha -->
  <line x1="28" y1="8" x2="28" y2="56"
    transform="rotate(-38 28 32)"
    stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Pestle: cabeça -->
  <ellipse cx="76" cy="17" rx="11" ry="7"
    transform="rotate(35 76 17)"
    fill="#2a3a2a"/>
  <!-- Pestle: haste -->
  <line x1="72" y1="24" x2="50" y2="64"
    stroke="#2a3a2a" stroke-width="9" stroke-linecap="round"/>

  <!-- Almofariz: braço esquerdo da borda -->
  <line x1="3"  y1="44" x2="16" y2="44"
    stroke="#2a3a2a" stroke-width="5" stroke-linecap="round"/>
  <!-- Almofariz: braço direito da borda -->
  <line x1="84" y1="44" x2="97" y2="44"
    stroke="#2a3a2a" stroke-width="5" stroke-linecap="round"/>
  <!-- Almofariz: arco do bowl -->
  <path d="M 16,44 C 16,83 34,89 50,89 C 66,89 84,83 84,44"
    fill="none" stroke="#2a3a2a" stroke-width="5" stroke-linecap="round"/>

  <!-- Base: laterais -->
  <line x1="34" y1="89" x2="34" y2="97"
    stroke="#2a3a2a" stroke-width="5" stroke-linecap="round"/>
  <line x1="66" y1="89" x2="66" y2="97"
    stroke="#2a3a2a" stroke-width="5" stroke-linecap="round"/>
  <!-- Base: fundo -->
  <line x1="27" y1="97" x2="73" y2="97"
    stroke="#2a3a2a" stroke-width="5" stroke-linecap="round"/>

</svg>
